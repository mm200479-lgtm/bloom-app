<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bloom.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#e8d5f5" />
    <meta name="description" content="Bloom - Your gentle daily companion" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple/iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bloom" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Prevent phone number detection on iOS -->
    <meta name="format-detection" content="telephone=no" />

    <title>Bloom 🌸</title>

    <style>
      /* Splash screen while app loads */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #faf5f0;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash svg { width: 80px; height: 80px; animation: pulse 2s ease infinite; }
      #splash p { margin-top: 12px; font-family: 'Nunito', sans-serif; color: #c9a8e8; font-size: 18px; font-weight: 700; }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="sp1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f5c0d8"/>
            <stop offset="100%" stop-color="#e8a0c0"/>
          </linearGradient>
          <linearGradient id="sp2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f0b8d0"/>
            <stop offset="100%" stop-color="#e098b8"/>
          </linearGradient>
          <radialGradient id="sc" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffe8a0"/>
            <stop offset="100%" stop-color="#e0c070"/>
          </radialGradient>
        </defs>
        <path d="M50 42 Q42 22 36 12 Q42 8 50 10 Q58 8 64 12 Q58 22 50 42Z" fill="url(#sp1)" opacity="0.9"/>
        <path d="M50 42 Q65 30 76 24 Q80 30 78 38 Q74 46 60 48 Q54 48 50 42Z" fill="url(#sp2)" opacity="0.85"/>
        <path d="M50 42 Q60 52 66 64 Q64 70 58 70 Q52 68 48 58 Q46 50 50 42Z" fill="url(#sp1)" opacity="0.9"/>
        <path d="M50 42 Q40 52 34 64 Q36 70 42 70 Q48 68 52 58 Q54 50 50 42Z" fill="url(#sp2)" opacity="0.85"/>
        <path d="M50 42 Q35 30 24 24 Q20 30 22 38 Q26 46 40 48 Q46 48 50 42Z" fill="url(#sp1)" opacity="0.9"/>
        <circle cx="50" cy="43" r="7" fill="url(#sc)"/>
        <path d="M50 55 Q49 68 48 82" stroke="#7aaa7a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M48 72 Q38 65 32 70 Q38 62 48 68" fill="#7aaa7a" opacity="0.8"/>
      </svg>
      <p>Bloom</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });

      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
